<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configura os caracteres para aceitar acentos -->
    <meta charset="UTF-8">

    <!-- Faz o site se adaptar ao tamanho da tela -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título que aparece na aba do navegador -->
    <title>To-Do List</title>

    <!-- Conecta o arquivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container principal do sistema -->
    <div class="container">
        <h1>Minha To-Do List</h1>

        <!-- Área para digitar e adicionar tarefas -->
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Digite uma tarefa">
            <button onclick="addTask()">Adicionar</button>
        </div>

        <!-- Área do contador -->
        <div class="contador">
            <p>Pendentes: <span id="pendingCount">0</span></p>
            <p>Concluídas: <span id="completedCount">0</span></p>
        </div>

        <!-- Lista onde as tarefas vão aparecer -->
        <ul id="taskList"></ul>
    </div>

    <!-- Conecta o arquivo JavaScript -->
    <script src="script.js"></script>
</body>
</html>
